<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedWatch – Nurse Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-body">

  <!-- Animated background particles -->
  <div class="bg-grid"></div>
  <div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ECG line decoration -->
  <div class="ecg-line">
    <svg viewBox="0 0 1200 80" preserveAspectRatio="none">
      <polyline class="ecg-path"
        points="0,40 100,40 120,40 130,10 140,70 150,40 160,40 200,40
                300,40 310,20 320,60 330,5 340,75 350,40 360,40 400,40
                500,40 520,40 530,15 540,65 550,40 570,40 600,40
                700,40 710,20 720,60 730,5 740,75 750,40 760,40 800,40
                900,40 920,40 930,10 940,70 950,40 960,40 1000,40
                1100,40 1110,20 1120,60 1130,5 1140,75 1150,40 1200,40"
        fill="none" stroke="#22d3ee" stroke-width="2" />
    </svg>
  </div>

  <main class="login-container">
    <!-- Logo / Branding -->
    <div class="login-brand">
      <div class="brand-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="10" fill="url(#brandGrad)"/>
          <defs>
            <linearGradient id="brandGrad" x1="0" y1="0" x2="36" y2="36">
              <stop offset="0%" stop-color="#06b6d4"/>
              <stop offset="100%" stop-color="#3b82f6"/>
            </linearGradient>
          </defs>
          <path d="M18 8v20M8 18h20" stroke="white" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">MedWatch</span>
        <span class="brand-sub">Patient Monitoring System</span>
      </div>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="login-card-header">
        <h1 class="login-title">Nurse Portal</h1>
        <p class="login-subtitle">Sign in to access your patient dashboard</p>
      </div>

      {% if error %}
      <div class="alert-error" id="loginError" role="alert">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="/login" class="login-form" id="loginForm">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="e.g. nurse1"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </form>

      <!-- Demo credentials -->
      <div class="demo-creds">
        <p class="demo-title">Demo Credentials</p>
        <div class="demo-accounts">
          <button class="demo-btn" onclick="fillCreds('nurse1','1234')">
            <span class="demo-tag">Nurse 1</span>
            <span>nurse1 / 1234 → Patients A & B</span>
          </button>
          <button class="demo-btn" onclick="fillCreds('nurse2','1234')">
            <span class="demo-tag">Nurse 2</span>
            <span>nurse2 / 1234 → Patient C</span>
          </button>
        </div>
      </div>
    </div>

    <p class="login-footer">
      <a href="/mobile" class="footer-link">📱 Open Mobile Alert View</a>
    </p>
  </main>

  <script>
    // Password toggle
    document.getElementById('pwToggle').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    // Fill demo credentials
    function fillCreds(user, pass) {
      document.getElementById('username').value = user;
      document.getElementById('password').value = pass;
      document.getElementById('loginBtn').classList.add('pulse');
    }

    // Login button loading state
    document.getElementById('loginForm').addEventListener('submit', () => {
      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '<span class="spinner"></span><span class="btn-text">Authenticating…</span>';
      btn.disabled = true;
    });
  </script>
</body>
</html>
